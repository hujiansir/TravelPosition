server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: travel-position-server

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://121.41.178.123:5432/mydb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&currentSchema=travel
    username: admin
    password: 123456

  data:
    redis:
      host: 121.41.178.123
      port: 6379
      password: 101101
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.travel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 微信小程序配置
wx:
  miniapp:
    appid: wx2f2926f00942112e
    secret: dfd310a360b7378cb299afd9c0fb4b76

# JWT 配置
jwt:
  secret: travel-position-secret-please-change-in-production-20240614
  expire-seconds: 604800

# 腾讯位置服务配置(逆地理编码)
tencent:
  map:
    key: PLUBZ-KFVKU-ARKV6-G3D4W-DZ4VH-WZBLK
    geocoder-url: https://apis.map.qq.com/ws/geocoder/v1/

# 日志配置
logging:
  level:
    com.travel: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
